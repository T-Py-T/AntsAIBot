name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync project (all extras)
        run: uv sync --all-extras --python ${{ matrix.python-version }}

      - name: Run pytest
        run: uv run --python ${{ matrix.python-version }} pytest -v

  integration:
    name: Integration test (make test)
    runs-on: ubuntu-latest
    needs: pytest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Sync project
        run: uv sync --all-extras

      - name: Run a real game (30 turns, 2 players) via make
        env:
          # Make `python3` invocations inside the Makefile use the uv venv.
          PATH: ${{ github.workspace }}/.venv/bin:${{ env.PATH }}
        run: make test

  docker:
    name: Docker image builds and runs make test
    runs-on: ubuntu-latest
    needs: pytest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: antsaibot:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run make test inside container
        run: docker run --rm antsaibot:ci make test
